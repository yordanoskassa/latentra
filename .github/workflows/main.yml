name: Latentra CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Build and test Electron app
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npx tsc --noEmit

    - name: Build Vite
      run: npm run build

    - name: Build Electron (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: npm run build:electron:linux || npm run dist:linux || echo "No Linux build script"

    - name: Build Electron (macOS)
      if: matrix.os == 'macos-latest'
      run: npm run build:electron:mac || npm run dist:mac || echo "No macOS build script"

    - name: Build Electron (Windows)
      if: matrix.os == 'windows-latest'
      run: npm run build:electron:win || npm run dist:win || echo "No Windows build script"

  # Lint and code quality
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint || echo "No lint script configured"

    - name: Check formatting
      run: npm run format:check || npm run prettier:check || echo "No format check script"
